<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cognitive Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h2>Neuro-Inclusive Settings</h2>
  </div>
  
  <div class="profile-cards">
    <div class="card" id="btn-adhd" data-profile="adhd">
      <div class="card-title">🎯 ADHD Focus</div>
      <div class="card-desc">Linear layout & hide clutter</div>
    </div>
    <div class="card" id="btn-autism" data-profile="autism">
      <div class="card-title">🎧 Autism Mode</div>
      <div class="card-desc">Mute colors & stop motion</div>
    </div>
    <div class="card" id="btn-dyslexia" data-profile="dyslexia">
      <div class="card-title">📖 Dyslexia Mode</div>
      <div class="card-desc">Dyslexia font & spaced text</div>
    </div>
  </div>

  <div class="divider"></div>
  
  <div class="actions">
    <button id="btn-simplify" class="primary">🤖 AI Summarize Page</button>
    <button id="btn-reset" class="secondary">Reset to Default</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
